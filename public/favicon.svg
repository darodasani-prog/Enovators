<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>
  </defs>
  <!-- Rounded corner logo box -->
  <rect width="36" height="36" rx="10" fill="url(#logo-grad)" />
  <!-- Bold modern serif/display 'E' matching the header logo -->
  <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" fill="#FFFFFF" font-family="'Space Grotesk', 'Plus Jakarta Sans', system-ui, sans-serif" font-weight="800" font-size="21">E</text>
</svg>
